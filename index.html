<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff6b2b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DisciplineOS">
  <meta name="description" content="Personal Recovery Operating System — offline-first PWA">
  <title>DisciplineOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">

    <!-- Init / Loading Screen -->
    <div class="init-screen" id="init-screen">
      <svg class="init-loader" width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="24" fill="none" stroke="url(#initGrad)" stroke-width="3" stroke-linecap="round"/>
        <defs>
          <linearGradient id="initGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff6b2b"/>
            <stop offset="100%" stop-color="#4fc3f7"/>
          </linearGradient>
        </defs>
      </svg>
      <div style="font-size:0.65rem;font-weight:800;letter-spacing:0.3em;color:#606060;">
        DISCIPLINE<span style="color:#ff6b2b;">OS</span>
      </div>
    </div>

    <!-- Onboarding Screen -->
    <div class="screen" id="screen-onboarding"></div>

    <!-- Dashboard / Home Screen -->
    <div class="screen" id="screen-dashboard" style="overflow-y:auto;"></div>

    <!-- Recovery Detail Screen -->
    <div class="screen" id="screen-recovery" style="overflow-y:auto;"></div>

    <!-- Emergency Protocol Screen -->
    <div class="screen" id="screen-emergency" style="overflow-y:auto;"></div>

    <!-- Knowledge Vault Screen -->
    <div class="screen" id="screen-knowledge" style="overflow-y:auto;"></div>

    <!-- Analytics Screen -->
    <div class="screen" id="screen-analytics" style="overflow-y:auto;"></div>

    <!-- Profile Screen -->
    <div class="screen" id="screen-profile" style="overflow-y:auto;"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" style="display:none;">
      <!-- Rendered by Navigation.buildNav() -->
    </nav>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay"></div>

  </div>

  <!-- ── Data Layer ──────────────────────────────────────── -->
  <script src="js/data/timelines.js"></script>
  <script src="js/data/missions.js"></script>
  <script src="js/data/knowledge.js"></script>

  <!-- ── Engines ────────────────────────────────────────── -->
  <script src="js/engines/recoveryEngine.js"></script>
  <script src="js/engines/bodyEngine.js"></script>
  <script src="js/engines/financeEngine.js"></script>
  <script src="js/engines/dopamineEngine.js"></script>
  <script src="js/engines/missionEngine.js"></script>
  <script src="js/engines/relapseEngine.js"></script>

  <!-- ── State ──────────────────────────────────────────── -->
  <script src="js/modules/stateManager.js"></script>

  <!-- ── UI Utilities ───────────────────────────────────── -->
  <script src="js/ui/charts.js"></script>

  <!-- ── Screens ────────────────────────────────────────── -->
  <script src="js/modules/onboarding.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/emergency.js"></script>
  <script src="js/modules/analytics.js"></script>
  <script src="js/modules/knowledge.js"></script>
  <script src="js/modules/profile.js"></script>
  <script src="js/modules/recovery.js"></script>

  <!-- ── Navigation ────────────────────────────────────── -->
  <script src="js/ui/navigation.js"></script>

  <!-- ── App Bootstrap ─────────────────────────────────── -->
  <script src="js/app.js"></script>
</body>
</html>
